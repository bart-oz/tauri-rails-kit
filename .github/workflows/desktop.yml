name: Desktop CI

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

jobs:
  fmt:
    name: Format check (rustfmt)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - run: npm install
        working-directory: .
      - run: cargo fmt --check

  clippy:
    name: Lint check (clippy)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - run: npm install
        working-directory: .
      - run: cargo clippy -- -D warnings

  check:
    name: Compile check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - run: npm install
        working-directory: .
      - run: cargo check

  test:
    name: Test check (cargo test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - run: npm install
        working-directory: .
      - run: cargo test
